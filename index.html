<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día del Padre 🔧</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d1117;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Fondo con patrón de cuadrícula técnica */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(30,160,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,160,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Partículas */
  .bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    opacity: 0;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1) rotate(360deg); opacity: 0; }
  }

  /* ── INPUT SCREEN ── */
  #input-screen {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeIn 0.7s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .title-wrap {
    text-align: center;
  }

  .title-wrap .eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 6px;
    color: #1ea0ff88;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .title-wrap h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: #e8f4ff;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 0 30px #1ea0ff55;
    line-height: 1.1;
  }

  .title-wrap h1 span {
    color: #1ea0ff;
  }

  #input-screen p {
    color: #4a7fa0;
    font-size: 1rem;
    letter-spacing: 1px;
    text-align: center;
  }

  #palabra {
    background: rgba(255,255,255,0.03);
    border: 2px solid #1ea0ff44;
    border-radius: 4px;
    padding: 14px 30px;
    font-size: 1.3rem;
    font-family: 'Oswald', sans-serif;
    color: #e8f4ff;
    outline: none;
    width: 290px;
    text-align: center;
    letter-spacing: 4px;
    text-transform: uppercase;
    transition: all 0.3s;
  }

  #palabra::placeholder {
    color: #1e4060;
    letter-spacing: 2px;
    font-size: 1rem;
  }

  #palabra:focus {
    border-color: #1ea0ff;
    box-shadow: 0 0 0 3px #1ea0ff22, inset 0 0 20px #1ea0ff08;
    background: rgba(30,160,255,0.05);
  }

  #btn-crear {
    background: #1ea0ff;
    border: none;
    border-radius: 4px;
    padding: 14px 44px;
    font-size: 1rem;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #0d1117;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px #1ea0ff44;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  #btn-crear:hover {
    background: #4db8ff;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px #1ea0ff55;
  }

  #btn-crear:active { transform: scale(0.97); }

  /* ── HEART SCREEN ── */
  #heart-screen {
    display: none;
    position: relative;
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }

  #shape-canvas {
    position: relative;
    width: 360px;
    height: 340px;
  }

  .letra-forma {
    position: absolute;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    text-shadow: 0 0 10px currentColor;
    text-transform: uppercase;
  }

  /* SVG estrella/silueta de fondo */
  .shape-bg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 1s;
  }

  .shape-bg.visible { opacity: 0.07; animation: pulseBg 2.5s ease-in-out infinite; }

  @keyframes pulseBg {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%      { transform: translate(-50%,-50%) scale(1.05); }
  }

  /* Mensaje final */
  #mensaje-final {
    opacity: 0;
    transform: scale(0.6) translateY(10px);
    transition: all 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
  }

  #mensaje-final.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  #mensaje-final h2 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    text-transform: uppercase;
    letter-spacing: 4px;
    color: #e8f4ff;
    text-shadow: 0 0 40px #1ea0ffaa, 0 0 80px #1ea0ff44;
    line-height: 1.2;
  }

  #mensaje-final h2 span { color: #1ea0ff; }

  #mensaje-final p {
    color: #4a7fa0;
    font-size: 0.95rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Reiniciar */
  #btn-reiniciar {
    background: transparent;
    border: 1px solid #1ea0ff44;
    border-radius: 4px;
    padding: 10px 28px;
    font-size: 0.85rem;
    font-family: 'Oswald', sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4a7fa0;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  #btn-reiniciar.show { opacity: 1; }

  #btn-reiniciar:hover {
    border-color: #1ea0ff;
    color: #1ea0ff;
    background: rgba(30,160,255,0.06);
  }

  /* Partículas finales */
  .blast-particle {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    font-size: 1.4rem;
    animation: blastOut 2.5s ease-out forwards;
  }

  @keyframes blastOut {
    0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(var(--rot)); }
  }

  /* Línea decorativa */
  .deco-line {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #1ea0ff, transparent);
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<!-- INPUT -->
<div id="input-screen">
  <div class="title-wrap">
    <div class="eyebrow">⚙️ homenaje especial ⚙️</div>
    <h1>Escribe una<br>palabra para <span>papá</span></h1>
  </div>
  <div class="deco-line"></div>
  <p>Se formará una estrella con tus letras 🌟</p>
  <input type="text" id="palabra" placeholder="Ej: PAPÁ, HÉROE..." maxlength="20">
  <button id="btn-crear">⚡ CREAR ⚡</button>
</div>

<!-- ANIMACIÓN -->
<div id="heart-screen">
  <div id="shape-canvas">
    <!-- Estrella SVG de fondo -->
    <svg class="shape-bg" id="shape-bg" width="320" height="320" viewBox="-160 -160 320 320">
      <polygon points="0,-150 35,-55 130,-55 55,20 85,115 0,60 -85,115 -55,20 -130,-55 -35,-55"
               fill="#1ea0ff"/>
    </svg>
  </div>

  <div id="mensaje-final">
    <h2>🏆 Feliz <span>Día</span><br>del <span>Padre</span> 🏆</h2>
    <div class="deco-line" style="margin-top:12px;"></div>
    <p>el más chingón del mundo</p>
  </div>

  <button id="btn-reiniciar">↺ Crear otro</button>
</div>

<script>
  // ── PARTÍCULAS DE FONDO ──
  const particlesEl = document.getElementById('particles');
  const bgEmojis = ['⚙️','🔧','🔩','⚡','🛠️','🔨','⭐','🏆'];

  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = bgEmojis[Math.floor(Math.random() * bgEmojis.length)];
    p.style.left = Math.random() * 100 + '%';
    p.style.fontSize = (10 + Math.random() * 14) + 'px';
    p.style.animationDuration = (7 + Math.random() * 9) + 's';
    p.style.animationDelay = (Math.random() * 9) + 's';
    particlesEl.appendChild(p);
  }

  // ── ESTRELLA DE 5 PUNTAS (puntos paramétricos) ──
  function getStarPoints(n) {
    const points = [];
    const totalSteps = n * 10;

    for (let i = 0; i < totalSteps; i++) {
      const t = (i / totalSteps) * 2 * Math.PI;
      // Ecuación polar de estrella de 5 puntas
      const k = 5;
      const r = Math.cos(k * t) > 0
        ? 1 + 0.55 * Math.cos(k * t)
        : 0.45 + 0.55 * Math.abs(Math.cos(k * t));

      const x = r * Math.cos(t - Math.PI / 2);
      const y = r * Math.sin(t - Math.PI / 2);
      points.push({ x, y });
    }

    // Seleccionar n puntos distribuidos
    const step = Math.floor(points.length / n);
    const selected = [];
    for (let i = 0; i < n; i++) selected.push(points[i * step]);
    return selected;
  }

  // ── LÓGICA PRINCIPAL ──
  const btnCrear     = document.getElementById('btn-crear');
  const btnReiniciar = document.getElementById('btn-reiniciar');
  const inputPalabra = document.getElementById('palabra');
  const inputScreen  = document.getElementById('input-screen');
  const heartScreen  = document.getElementById('heart-screen');
  const shapeCanvas  = document.getElementById('shape-canvas');
  const mensajeFinal = document.getElementById('mensaje-final');
  const shapeBg      = document.getElementById('shape-bg');

  inputPalabra.addEventListener('keydown', e => {
    if (e.key === 'Enter') btnCrear.click();
  });

  btnCrear.addEventListener('click', () => {
    const raw = inputPalabra.value.trim().toUpperCase();
    if (!raw) {
      inputPalabra.focus();
      inputPalabra.style.borderColor = '#ff4444';
      setTimeout(() => inputPalabra.style.borderColor = '#1ea0ff44', 600);
      return;
    }
    iniciarAnimacion(raw);
  });

  btnReiniciar.addEventListener('click', () => {
    heartScreen.style.display = 'none';
    inputScreen.style.display = 'flex';
    mensajeFinal.classList.remove('show');
    btnReiniciar.classList.remove('show');
    shapeBg.classList.remove('visible');
    inputPalabra.value = '';
    document.querySelectorAll('.letra-forma').forEach(l => l.remove());
  });

  function iniciarAnimacion(palabra) {
    inputScreen.style.display = 'none';
    heartScreen.style.display = 'flex';

    document.querySelectorAll('.letra-forma').forEach(l => l.remove());

    const N = 85;
    const puntos = getStarPoints(N);

    // Centro y escala del canvas
    const cx = 180, cy = 170, scale = 130;

    // Paleta de colores masculina: azules, aceros, dorados
    const colores = [
      '#1ea0ff', '#4db8ff', '#80ccff',
      '#ffd700', '#ffbb00',
      '#aaccdd', '#c8e0f0'
    ];

    const letras = [];

    for (let i = 0; i < N; i++) {
      const span = document.createElement('span');
      span.className = 'letra-forma';
      span.textContent = palabra[i % palabra.length];

      const size = 9 + Math.floor(Math.random() * 8);
      span.style.fontSize = size + 'px';
      span.style.color = colores[Math.floor(Math.random() * colores.length)];

      const px = cx + puntos[i].x * scale;
      const py = cy + puntos[i].y * scale;
      span.style.left = px + 'px';
      span.style.top  = py + 'px';
      span.style.transform = 'translate(-50%, -50%)';

      shapeCanvas.appendChild(span);
      letras.push(span);
    }

    // Animación de aparición con efecto "chispa"
    const delay = 35;

    letras.forEach((letra, i) => {
      setTimeout(() => {
        letra.style.opacity = '1';
        letra.style.transform = 'translate(-50%, -50%) scale(1.6)';
        setTimeout(() => {
          letra.style.transition = 'transform 0.15s ease';
          letra.style.transform = 'translate(-50%, -50%) scale(1)';
        }, 60);
      }, i * delay);
    });

    const total = N * delay + 600;

    setTimeout(() => {
      shapeBg.classList.add('visible');
    }, total - 400);

    setTimeout(() => {
      mensajeFinal.classList.add('show');
      btnReiniciar.classList.add('show');
      lanzarParticulasFinales();
    }, total);
  }

  function lanzarParticulasFinales() {
    const items = ['🏆','⭐','⚡','🔧','💪','🌟','🎖️','🛠️'];
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for (let i = 0; i < 22; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'blast-particle';
        p.textContent = items[Math.floor(Math.random() * items.length)];

        const angle = Math.random() * Math.PI * 2;
        const dist  = 200 + Math.random() * 300;
        const tx = Math.cos(angle) * dist;
        const ty = Math.sin(angle) * dist - 100;
        const rot = (Math.random() - 0.5) * 720 + 'deg';

        p.style.setProperty('--tx', tx + 'px');
        p.style.setProperty('--ty', ty + 'px');
        p.style.setProperty('--rot', rot);
        p.style.left = cx + 'px';
        p.style.top  = cy + 'px';
        p.style.animationDuration = (1.5 + Math.random()) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 3000);
      }, i * 80);
    }
  }
</script>
</body>
</html>
