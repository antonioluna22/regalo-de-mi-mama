<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Día de las Madres 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink:      #ff4d88;
  --pink-soft: #ffb3d1;
  --text-mid:  #e080aa;
  --text-dim:  #8a4466;
  --text-hint: #5a2a44;
  --bg:        #1a0010;
}

html, body { width: 100%; height: 100%; }

body {
  min-height: 100dvh;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
  position: relative;
}

/* ── FONDO ── */
.bg-glow {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: clamp(300px, 80vw, 700px);
  height: clamp(300px, 80vw, 700px);
  background: radial-gradient(circle, rgba(255,77,136,0.11) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

.particle {
  position: absolute;
  opacity: 0;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0%   { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.18; }
  100% { transform: translateY(-10vh) scale(1) rotate(20deg); opacity: 0; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════
   PANTALLA ENTRADA
══════════════════════════════ */
#input-screen {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: min(92vw, 480px);
  padding: 0 16px;
  animation: fadeIn 0.9s cubic-bezier(0.22,1,0.36,1);
}

#input-screen h1 {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.7rem, 6vw, 3.2rem);
  color: var(--pink-soft);
  text-shadow: 0 0 40px rgba(255,77,136,0.45);
  text-align: center;
  line-height: 1.25;
  margin-bottom: 8px;
}

#input-screen .sub {
  color: var(--text-mid);
  font-size: clamp(0.82rem, 2.5vw, 0.97rem);
  text-align: center;
  margin-bottom: 26px;
}

.sugerencias {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 16px;
}

.sugerencia {
  background: rgba(255,77,136,0.09);
  border: 1px solid rgba(255,77,136,0.25);
  border-radius: 50px;
  padding: 5px 14px;
  color: var(--text-mid);
  font-size: clamp(0.72rem, 2vw, 0.82rem);
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.sugerencia:hover, .sugerencia:active {
  background: rgba(255,77,136,0.22);
  color: var(--pink-soft);
  border-color: rgba(255,77,136,0.55);
  transform: translateY(-1px);
}

.input-wrap {
  position: relative;
  width: 100%;
  max-width: 300px;
  margin-bottom: 4px;
}

#palabra {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(255,77,136,0.45);
  border-radius: 50px;
  padding: 13px 28px;
  font-size: clamp(1rem, 3.5vw, 1.2rem);
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  color: #ffe0f0;
  outline: none;
  width: 100%;
  text-align: center;
  transition: all 0.3s;
  letter-spacing: 3px;
}

#palabra::placeholder { color: var(--text-hint); letter-spacing: 1px; }
#palabra:focus {
  border-color: var(--pink);
  box-shadow: 0 0 0 3px rgba(255,77,136,0.15), 0 0 28px rgba(255,77,136,0.2);
  background: rgba(255,77,136,0.07);
}
#palabra.error {
  border-color: #ff0055;
  box-shadow: 0 0 0 3px rgba(255,0,85,0.2);
  animation: shake 0.4s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-6px); }
  40%     { transform: translateX(6px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

.counter {
  text-align: right;
  font-size: 0.76rem;
  color: var(--text-hint);
  margin-top: 5px;
  padding-right: 12px;
  transition: color 0.3s;
}
.counter.warn { color: var(--pink); }

#loading-bar-wrap {
  position: absolute;
  bottom: -18px; left: 50%;
  transform: translateX(-50%);
  width: 180px; height: 3px;
  background: rgba(255,77,136,0.15);
  border-radius: 10px;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.3s;
}
#loading-bar-wrap.show { opacity: 1; }
#loading-bar {
  height: 100%; width: 0%;
  background: linear-gradient(to right, var(--pink), var(--pink-soft));
  border-radius: 10px;
  transition: width 0.1s linear;
}

#btn-crear {
  margin-top: 24px;
  background: linear-gradient(135deg, #ff4d88, #ff85b3);
  border: none;
  border-radius: 50px;
  padding: clamp(12px,3vw,15px) clamp(30px,8vw,48px);
  font-size: clamp(0.95rem, 3vw, 1.08rem);
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  color: white;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 28px rgba(255,77,136,0.45);
  letter-spacing: 0.5px;
  animation: btnPulse 2.8s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
}

@keyframes btnPulse {
  0%,100% { box-shadow: 0 6px 28px rgba(255,77,136,0.45); }
  50%     { box-shadow: 0 8px 44px rgba(255,77,136,0.72); }
}

#btn-crear:hover { transform: translateY(-2px) scale(1.05); animation: none; box-shadow: 0 10px 44px rgba(255,77,136,0.68); }
#btn-crear:active { transform: scale(0.97); animation: none; }

.divider {
  width: min(80%, 260px);
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,77,136,0.3), transparent);
  margin: 24px 0 16px;
}

.features {
  display: flex;
  gap: clamp(16px, 5vw, 28px);
  justify-content: center;
}

.feat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.feat-icon {
  width: clamp(34px,8vw,40px);
  height: clamp(34px,8vw,40px);
  border-radius: 50%;
  background: rgba(255,77,136,0.08);
  border: 1px solid rgba(255,77,136,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(14px,4vw,17px);
  transition: transform 0.2s, background 0.2s;
}
.feat:hover .feat-icon { background: rgba(255,77,136,0.18); transform: scale(1.1); }

.feat-label {
  font-size: clamp(0.63rem, 1.8vw, 0.73rem);
  color: var(--text-dim);
  text-align: center;
  line-height: 1.4;
}

/* ══════════════════════════════
   PANTALLA CORAZÓN
══════════════════════════════ */
#heart-screen {
  display: none;
  position: relative;
  z-index: 10;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(6px, 2vh, 14px);
  width: 100%;
  padding: 8px 16px;
  animation: fadeIn 0.6s ease;
}

#heart-canvas {
  position: relative;
  /* tamaño seteado por JS */
  flex-shrink: 0;
}

#heart-canvas svg.layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.letra-corazon {
  position: absolute;
  font-family: 'Dancing Script', cursive;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  text-shadow: 0 0 10px rgba(255,77,136,0.7), 0 0 22px rgba(255,100,150,0.3);
  transition: opacity 0.15s, transform 0.2s;
}

.heart-outline { opacity: 0; transition: opacity 0.5s; }
.heart-outline.visible { opacity: 1; }

.heart-path-draw {
  stroke-dasharray: 900;
  stroke-dashoffset: 900;
  transition: stroke-dashoffset 2.5s ease;
}
.heart-path-draw.drawn { stroke-dashoffset: 0; }

.heart-svg { opacity: 0; transition: opacity 1.2s ease; }
.heart-svg.visible {
  opacity: 0.07;
  animation: heartPulse 2.2s ease-in-out infinite;
}

@keyframes heartPulse {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}

/* ── FLORES LATERALES ── */
.flor-container {
  position: absolute;
  opacity: 0;
  transition: opacity 0.7s cubic-bezier(0.34,1.56,0.64,1),
              transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
  display: flex;
  align-items: center;
  justify-content: center;
  width: clamp(60px, 18vw, 90px);
  height: clamp(60px, 18vw, 90px);
}

#flor-izq {
  left: -15%;
  transform: scale(0) rotate(-25deg);
}
#flor-der {
  right: -15%;
  transform: scale(0) rotate(25deg);
}

.flor-container.show {
  opacity: 1;
  transform: scale(1) rotate(0deg);
}

.flor-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
  animation: florFlota 4s ease-in-out infinite;
}

@keyframes florFlota {
  0%,100% { transform: translateY(0) rotate(-2deg); }
  50%     { transform: translateY(-5px) rotate(2deg); }
}

/* Pétalos — transform-box para que la rotación sea relativa al bbox del elemento */
.pet {
  transform-box: fill-box;
  transform-origin: center bottom;
}

.flor-container.show .pet { animation: petaloBrillo 3s ease-in-out infinite; }
.flor-container.show .pet:nth-child(1) { animation-delay: 0s; }
.flor-container.show .pet:nth-child(2) { animation-delay: 0.25s; }
.flor-container.show .pet:nth-child(3) { animation-delay: 0.5s; }
.flor-container.show .pet:nth-child(4) { animation-delay: 0.75s; }
.flor-container.show .pet:nth-child(5) { animation-delay: 1s; }
.flor-container.show .pet:nth-child(6) { animation-delay: 1.25s; }

@keyframes petaloBrillo {
  0%,100% { opacity: 0.9; }
  50%     { opacity: 1; filter: brightness(1.12); }
}

.flor-container.show #centro-g {
  animation: centroPop 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  transform-origin: 50px 50px;
}

@keyframes centroPop {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

.flor-container.show #tallo-line {
  animation: talloCrecer 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes talloCrecer {
  from { stroke-dashoffset: 60; }
  to   { stroke-dashoffset: 0; }
}

/* ── MENSAJE FINAL ── */
#mensaje-final {
  opacity: 0;
  transform: scale(0.7) translateY(8px);
  transition: all 0.9s cubic-bezier(0.34,1.56,0.64,1);
  text-align: center;
}
#mensaje-final.show { opacity: 1; transform: scale(1) translateY(0); }

#mensaje-final h2 {
  font-family: 'Dancing Script', cursive;
  font-size: clamp(1.7rem, 6vw, 3.6rem);
  color: var(--pink-soft);
  text-shadow: 0 0 50px rgba(255,77,136,0.7), 0 0 100px rgba(255,77,136,0.3);
  line-height: 1.25;
}

#mensaje-final p {
  color: var(--text-mid);
  font-size: clamp(0.78rem, 2.5vw, 0.95rem);
  margin-top: 4px;
  letter-spacing: 2px;
}

#btn-reiniciar {
  background: transparent;
  border: 1.5px solid rgba(255,77,136,0.35);
  border-radius: 50px;
  padding: 9px 26px;
  font-size: clamp(0.8rem, 2.5vw, 0.88rem);
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  opacity: 0;
  pointer-events: none;
  -webkit-tap-highlight-color: transparent;
}
#btn-reiniciar.show { opacity: 1; pointer-events: auto; }
#btn-reiniciar:hover, #btn-reiniciar:active {
  border-color: var(--pink);
  color: var(--pink-soft);
  background: rgba(255,77,136,0.09);
}

/* Corazones flotantes */
.float-heart {
  position: fixed;
  animation: floatHeart 3s ease-in forwards;
  pointer-events: none;
  z-index: 20;
}

@keyframes floatHeart {
  0%   { transform: translateY(0) scale(1) rotate(-5deg); opacity: 1; }
  100% { transform: translateY(-85vh) scale(0.2) rotate(25deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-particles" id="particles"></div>

<!-- ══ PANTALLA ENTRADA ══ -->
<div id="input-screen">
  <h1>✨ Escribe una palabra<br>para mamá ✨</h1>
  <p class="sub">Se formará un corazón con tus letras 💖</p>

  <div class="sugerencias">
    <button class="sugerencia" onclick="setSugerencia('MAMÁ')">MAMÁ</button>
    <button class="sugerencia" onclick="setSugerencia('TE AMO')">TE AMO</button>
    <button class="sugerencia" onclick="setSugerencia('GRACIAS')">GRACIAS</button>
    <button class="sugerencia" onclick="setSugerencia('MI REINA')">MI REINA</button>
  </div>

  <div class="input-wrap">
    <input type="text" id="palabra" placeholder="AMOR, MAMÁ..." maxlength="20">
    <div class="counter" id="counter">0 / 20</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <button id="btn-crear">Crear corazón 💗</button>

  <div class="divider"></div>

  <div class="features">
    <div class="feat">
      <div class="feat-icon">💌</div>
      <div class="feat-label">Tu palabra<br>en letras</div>
    </div>
    <div class="feat">
      <div class="feat-icon">💖</div>
      <div class="feat-label">Forma de<br>corazón</div>
    </div>
    <div class="feat">
      <div class="feat-icon">✨</div>
      <div class="feat-label">Animación<br>mágica</div>
    </div>
  </div>
</div>

<!-- ══ PANTALLA CORAZÓN ══ -->
<div id="heart-screen">

  <div id="heart-canvas">
    <svg class="layer heart-outline" id="heart-outline" viewBox="0 0 300 280" preserveAspectRatio="xMidYMid meet">
      <path class="heart-path-draw" id="heart-path-draw"
        d="M150 240 C150 240 20 160 20 90 C20 50 50 20 90 20 C110 20 130 30 150 50 C170 30 190 20 210 20 C250 20 280 50 280 90 C280 160 150 240 150 240Z"
        fill="none" stroke="#ff4d88" stroke-width="1.5" stroke-opacity="0.5"/>
    </svg>
    <svg class="layer heart-svg" id="heart-bg" viewBox="0 0 300 280" preserveAspectRatio="xMidYMid meet">
      <path d="M150 240 C150 240 20 160 20 90 C20 50 50 20 90 20 C110 20 130 30 150 50 C170 30 190 20 210 20 C250 20 280 50 280 90 C280 160 150 240 150 240Z"
            fill="#ff4d88"/>
    </svg>
  </div>

  <!-- FLORES LATERALES — posicionadas respecto al canvas del corazón -->
  <div class="flor-container" id="flor-izq">
    <svg class="flor-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Tallo + hojitas (detrás de todo) -->
      <line id="tallo-line" x1="50" y1="62" x2="50" y2="88"
            stroke="#5a9e4a" stroke-width="3" stroke-linecap="round"
            stroke-dasharray="60" stroke-dashoffset="60"/>
      <ellipse cx="40" cy="78" rx="9" ry="4.5" fill="#6ab85a" opacity="0.85"
               transform="rotate(-35 40 78)"/>
      <ellipse cx="60" cy="82" rx="9" ry="4.5" fill="#6ab85a" opacity="0.85"
               transform="rotate(35 60 82)"/>

      <!-- 6 pétalos externos — pivot (50 50) -->
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff85b3" opacity="0.93" transform="rotate(0   50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff6aa0" opacity="0.90" transform="rotate(60  50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ffaac8" opacity="0.93" transform="rotate(120 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff4d88" opacity="0.90" transform="rotate(180 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff6aa0" opacity="0.90" transform="rotate(240 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff85b3" opacity="0.93" transform="rotate(300 50 50)"/>

      <!-- 6 pétalos internos — más cortos, a 30° de offset -->
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(30  50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(90  50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(150 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(210 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(270 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(330 50 50)"/>

      <!-- Centro (encima de todo) -->
      <g id="centro-g">
        <circle cx="50" cy="50" r="14" fill="#ffed4a"/>
        <circle cx="50" cy="50" r="9.5" fill="#ffd900"/>
        <circle cx="46" cy="47" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="53" cy="46" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="48" cy="54" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="55" cy="53" r="1.4" fill="#b37700" opacity="0.5"/>
        <circle cx="44" cy="53" r="1.1" fill="#b37700" opacity="0.45"/>
        <circle cx="46" cy="45" r="3.5" fill="white"   opacity="0.30"/>
      </g>
    </svg>
  </div>

  <div class="flor-container" id="flor-der">
    <svg class="flor-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Tallo + hojitas (detrás de todo) -->
      <line id="tallo-line" x1="50" y1="62" x2="50" y2="88"
            stroke="#5a9e4a" stroke-width="3" stroke-linecap="round"
            stroke-dasharray="60" stroke-dashoffset="60"/>
      <ellipse cx="40" cy="78" rx="9" ry="4.5" fill="#6ab85a" opacity="0.85"
               transform="rotate(-35 40 78)"/>
      <ellipse cx="60" cy="82" rx="9" ry="4.5" fill="#6ab85a" opacity="0.85"
               transform="rotate(35 60 82)"/>

      <!-- 6 pétalos externos — pivot (50 50) -->
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff85b3" opacity="0.93" transform="rotate(0   50 50)"/>

      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ffaac8" opacity="0.93" transform="rotate(120 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff4d88" opacity="0.90" transform="rotate(180 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff6aa0" opacity="0.90" transform="rotate(240 50 50)"/>
      <ellipse class="pet" cx="50" cy="32" rx="10" ry="18" fill="#ff85b3" opacity="0.93" transform="rotate(300 50 50)"/>

      <!-- 6 pétalos internos — más cortos, a 30° de offset -->
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(30  50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(90  50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(150 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(210 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffcce0" opacity="0.65" transform="rotate(270 50 50)"/>
      <ellipse cx="50" cy="37" rx="6.5" ry="12" fill="#ffb3d1" opacity="0.70" transform="rotate(330 50 50)"/>

      <!-- Centro (encima de todo) -->
      <g id="centro-g">
        <circle cx="50" cy="50" r="14" fill="#ffed4a"/>
        <circle cx="50" cy="50" r="9.5" fill="#ffd900"/>
        <circle cx="46" cy="47" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="53" cy="46" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="48" cy="54" r="1.4" fill="#b37700" opacity="0.6"/>
        <circle cx="55" cy="53" r="1.4" fill="#b37700" opacity="0.5"/>
        <circle cx="44" cy="53" r="1.1" fill="#b37700" opacity="0.45"/>
        <circle cx="46" cy="45" r="3.5" fill="white"   opacity="0.30"/>
      </g>
    </svg>
  </div>

  <div id="mensaje-final">
    <h2>💖 Feliz Día<br>de las Madres 💖</h2>
    <p>con todo el amor del mundo</p>
  </div>

  <button id="btn-reiniciar">🔄 Crear otro</button>
</div>

<script>
// ── PARTÍCULAS ──
const particlesEl = document.getElementById('particles');
const emojis = ['❤️','💕','✨','🌸','💖','🌷','💗','🌺'];
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emojis[i % emojis.length];
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (7 + Math.random() * 9) + 's';
  p.style.animationDelay = (Math.random() * 10) + 's';
  p.style.fontSize = (10 + Math.random() * 14) + 'px';
  particlesEl.appendChild(p);
}

// ── TAMAÑO DEL CANVAS ──
function getCanvasSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const maxH = vh - 290;   // mensaje ~85, botón ~40, gaps+pad ~85 (flores ya no ocupan espacio vertical)
  const maxW = vw * 0.88;
  return Math.max(180, Math.min(360, maxH, maxW));
}

// ── CONTADOR ──
const palabraInput = document.getElementById('palabra');
const counterEl    = document.getElementById('counter');
palabraInput.addEventListener('input', () => {
  const len = palabraInput.value.length;
  counterEl.textContent = len + ' / 20';
  counterEl.classList.toggle('warn', len >= 16);
});
palabraInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-crear').click();
});

// ── SUGERENCIAS ──
function setSugerencia(w) {
  palabraInput.value = w;
  counterEl.textContent = w.length + ' / 20';
  counterEl.classList.toggle('warn', w.length >= 16);
  palabraInput.focus();
}

// ── PUNTOS DEL CORAZÓN ──
function getHeartPoints(n) {
  const raw = [];
  for (let i = 0; i < n * 6; i++) {
    const t = (i / (n * 6)) * 2 * Math.PI;
    const x =  16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    raw.push({ x, y });
  }
  const step = Math.floor(raw.length / n);
  const sel = [];
  for (let i = 0; i < n; i++) sel.push(raw[i * step]);
  return sel;
}

// ── REFS ──
const btnCrear      = document.getElementById('btn-crear');
const btnReiniciar  = document.getElementById('btn-reiniciar');
const inputScreen   = document.getElementById('input-screen');
const heartScreen   = document.getElementById('heart-screen');
const heartCanvas   = document.getElementById('heart-canvas');
const mensajeFinal  = document.getElementById('mensaje-final');
const heartBg       = document.getElementById('heart-bg');
const heartOutline  = document.getElementById('heart-outline');
const heartPathDraw = document.getElementById('heart-path-draw');
const loadingWrap   = document.getElementById('loading-bar-wrap');
const loadingBar    = document.getElementById('loading-bar');
const florIzq       = document.getElementById('flor-izq');
const florDer       = document.getElementById('flor-der');

function applyCanvasSize(sz) {
  heartCanvas.style.width  = sz + 'px';
  heartCanvas.style.height = sz + 'px';
}

btnCrear.addEventListener('click', () => {
  const raw = palabraInput.value.trim().toUpperCase();
  if (!raw) {
    palabraInput.classList.add('error');
    setTimeout(() => palabraInput.classList.remove('error'), 700);
    palabraInput.focus();
    return;
  }
  loadingWrap.classList.add('show');
  loadingBar.style.width = '0%';
  setTimeout(() => { loadingBar.style.width = '100%'; }, 50);
  setTimeout(() => {
    loadingWrap.classList.remove('show');
    iniciarAnimacion(raw);
  }, 600);
});

btnReiniciar.addEventListener('click', () => {
  heartScreen.style.display = 'none';
  inputScreen.style.display  = 'flex';
  mensajeFinal.classList.remove('show');
  btnReiniciar.classList.remove('show');
  florIzq.classList.remove('show');
  florDer.classList.remove('show');
  heartBg.classList.remove('visible');
  heartOutline.classList.remove('visible');
  heartPathDraw.classList.remove('drawn');
  palabraInput.value = '';
  counterEl.textContent = '0 / 20';
  counterEl.classList.remove('warn');
  document.querySelectorAll('.letra-corazon').forEach(l => l.remove());
});

function iniciarAnimacion(palabra) {
  const sz = getCanvasSize();
  applyCanvasSize(sz);

  inputScreen.style.display = 'none';
  heartScreen.style.display = 'flex';
  document.querySelectorAll('.letra-corazon').forEach(l => l.remove());

  // 1. Trazo del corazón
  heartOutline.classList.add('visible');
  setTimeout(() => heartPathDraw.classList.add('drawn'), 80);

  // Mapear puntos paramétricos al canvas real
  const scale  = sz / 300;
  const vcx    = 150, vcy = 140, hscale = 8.5;
  const N      = 85;
  const puntos = getHeartPoints(N);

  const letras = [];
  for (let i = 0; i < N; i++) {
    const letra = document.createElement('span');
    letra.className = 'letra-corazon';
    letra.textContent = palabra[i % palabra.length];

    const base = Math.max(8, Math.floor(sz / 32));
    letra.style.fontSize = (base + Math.floor(Math.random() * 4)) + 'px';

    const hue   = 315 + Math.floor(Math.random() * 45);
    const light = 55  + Math.floor(Math.random() * 22);
    letra.style.color = `hsl(${hue}, 100%, ${light}%)`;

    const px = (vcx + puntos[i].x * hscale) * scale;
    const py = (vcy + puntos[i].y * hscale) * scale;
    letra.style.left = px + 'px';
    letra.style.top  = py + 'px';
    letra.style.transform = 'translate(-50%, -50%) scale(0)';

    heartCanvas.appendChild(letra);
    letras.push(letra);
  }

  const startDelay = 800, delayLetra = 35;
  letras.forEach((letra, i) => {
    setTimeout(() => {
      letra.style.opacity = '1';
      letra.style.transform = 'translate(-50%, -50%) scale(1.5)';
      setTimeout(() => {
        letra.style.transition = 'transform 0.25s cubic-bezier(0.34,1.56,0.64,1)';
        letra.style.transform = 'translate(-50%, -50%) scale(1)';
      }, 60);
    }, startDelay + i * delayLetra);
  });

  const total = startDelay + N * delayLetra + 500;

  setTimeout(() => {
    heartOutline.classList.remove('visible');
    heartBg.classList.add('visible');
  }, total - 300);

  setTimeout(() => {
    // Ambas flores aparecen con un pequeño desfase
    setTimeout(() => florIzq.classList.add('show'), 0);
    setTimeout(() => florDer.classList.add('show'), 150);
    
    setTimeout(() => {
      mensajeFinal.classList.add('show');
      btnReiniciar.classList.add('show');
      lanzarCorazones();
    }, 600);
  }, total + 150);
}

function lanzarCorazones() {
  const emFinal = ['💖','💗','💕','❤️','🌹','✨','🌸','🌺'];
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const h = document.createElement('div');
      h.className = 'float-heart';
      h.textContent = emFinal[Math.floor(Math.random() * emFinal.length)];
      h.style.fontSize = (14 + Math.random() * 18) + 'px';
      h.style.left = (8 + Math.random() * 84) + '%';
      h.style.bottom = '-30px';
      h.style.animationDuration = (2.2 + Math.random() * 2) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 4500);
    }, i * 110);
  }
}

window.addEventListener('resize', () => {
  if (heartScreen.style.display !== 'none') {
    applyCanvasSize(getCanvasSize());
  }
});
</script>
</body>
</html>
